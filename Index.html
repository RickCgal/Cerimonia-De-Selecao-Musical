<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Chapéu Seletor Musical</title>
    <style>
        body {
            background-color: #111;
            color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #d4af37; text-shadow: 2px 2px 4px #000; }
        p { color: #a1887f; font-size: 1.2em; }
        
        /* O Chapéu Estático */
        .hat-image {
            width: 350px;
            margin: 20px auto;
            display: block;
        }

        .controls { margin-top: 20px; margin-bottom: 20px; }
        
        button {
            padding: 12px 24px;
            margin: 10px;
            font-size: 18px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            background-color: #222;
            color: #d4af37;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover { background-color: #d4af37; color: #111; }
        
        #btn-reveal {
            display: none;
            background-color: #550000;
            color: white;
            border-color: #ff4444;
            font-size: 22px;
            margin-top: 30px;
        }
        #btn-reveal:hover { background-color: #ff4444; }

        #result-box {
            display: none;
            margin: 30px auto;
            padding: 30px;
            max-width: 600px;
            border-radius: 15px;
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.2);
        }

        /* Cores das Casas de Hogwarts */
        .grifinoria { background-color: #740001; color: #D3A625; border: 5px solid #D3A625; }
        .sonserina { background-color: #1A472A; color: #AAAAAA; border: 5px solid #AAAAAA; }
        .corvinal { background-color: #0E1A40; color: #946B2D; border: 5px solid #946B2D; }
        .lufalufa { background-color: #FFDB00; color: #000000; border: 5px solid #000000; }
    </style>
</head>
<body>

    <h1>Cerimônia de Seleção Musical</h1>
    <p>Escute o trecho misterioso e debata com sua equipe!</p>

    <img src="chapeu.jpg" alt="Chapéu Seletor" class="hat-image">

    <div class="controls">
        <button onclick="selectMusic('Corvinal', 'Bossa Nova (Garota de Ipanema) - Técnica, calma e sofisticada!', 'corvinal', 'audio1')">Música 1</button>
        <button onclick="selectMusic('Lufa-Lufa', 'Jovem Guarda (O Calhambeque) - Festa, amigos e alegria!', 'lufalufa', 'audio2')">Música 2</button>
        <button onclick="selectMusic('Grifinória', 'Era dos Festivais (A Banda) - Coragem e voz forte!', 'grifinoria', 'audio3')">Música 3</button>
        <button onclick="selectMusic('Sonserina', 'Tropicalismo (Trem Fantasma) - Ousadia, efeitos malucos e subversão!', 'sonserina', 'audio4')">Música 4</button>
    </div>

    <audio id="audio1" src="Dick Farney - Garota de Ipanema.mp3"></audio>
    <audio id="audio2" src="Roberto Carlos - O Calhambeque (Road Hog) (Áudio Oficial).mp3"></audio>
    <audio id="audio3" src="Chico Buarque - A Banda.mp3"></audio>
    <audio id="audio4" src="Os Mutantes - Trem Fantasma.mp3"></audio>

    <button id="btn-reveal" onclick="revealHouse()">REVELAR A CASA!</button>

    <div id="result-box"></div>

    <script>
        let currentHouse = "";
        let currentDescription = "";
        let currentStyleClass = "";

        function stopAllAudio() {
            const audios = document.querySelectorAll('audio');
            audios.forEach(audio => { audio.pause(); });
        }

        function selectMusic(house, description, styleClass, audioId) {
            stopAllAudio();
            
            const audioElement = document.getElementById(audioId);
            if(audioElement) {
                // Inicia O Calhambeque aos 20 segundos
                if (audioId === 'audio2') {
                    audioElement.currentTime = 20;
                } else {
                    audioElement.currentTime = 0;
                }
                audioElement.play();
            }

            currentHouse = house;
            currentDescription = description;
            currentStyleClass = styleClass;
            
            document.getElementById("result-box").style.display = "none";
            document.getElementById("btn-reveal").style.display = "inline-block";
        }

        function revealHouse() {
            const resultBox = document.getElementById("result-box");
            resultBox.innerHTML = `VAI PARA...<br><br><span style="font-size: 50px;">${currentHouse}!</span><br><br><span style="font-size: 20px;">${currentDescription}</span>`;
            
            resultBox.className = ""; 
            resultBox.classList.add(currentStyleClass);
            
            resultBox.style.display = "block";
            document.getElementById("btn-reveal").style.display = "none";
        }
    </script>

</body>
</html>
